// ============================================================================
// CREDIT MANAGER
// ============================================================================
const CREDIT_CONFIG = {
  STORAGE_KEY: 'synapse-credits',
  HISTORY_KEY: 'synapse-credit-history',
  INITIAL: 100,
  REPORT_COST: 10,
};

function getCredits() {
  try {
    const v = localStorage.getItem(CREDIT_CONFIG.STORAGE_KEY);
    if (v === null) {
      setCredits(CREDIT_CONFIG.INITIAL);
      return CREDIT_CONFIG.INITIAL;
    }
    const n = parseInt(v, 10);
    return isNaN(n) || n < 0 ? CREDIT_CONFIG.INITIAL : n;
  } catch {
    return CREDIT_CONFIG.INITIAL;
  }
}

function setCredits(n) {
  try { localStorage.setItem(CREDIT_CONFIG.STORAGE_KEY, String(n)); } catch {}
}

function addCreditHistory(entry) {
  try {
    const raw = localStorage.getItem(CREDIT_CONFIG.HISTORY_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    arr.unshift(entry);
    if (arr.length > 50) arr.length = 50;
    localStorage.setItem(CREDIT_CONFIG.HISTORY_KEY, JSON.stringify(arr));
  } catch {}
}

function getCreditHistory() {
  try {
    const raw = localStorage.getItem(CREDIT_CONFIG.HISTORY_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function deductCredits(amount, reason) {
  const current = getCredits();
  if (current < amount) {
    return { success: false, balance: current, reason: 'insufficient' };
  }
  const newBalance = current - amount;
  setCredits(newBalance);
  addCreditHistory({
    time: new Date().toISOString(),
    type: 'deduct',
    amount: -amount,
    balance: newBalance,
    detail: reason,
  });
  return { success: true, balance: newBalance };
}

function formatCredits(n) { return String(n); }

function updateCreditUI() {
  const c = getCredits();
  const el = document.getElementById('creditCount');
  const badge = document.getElementById('creditBadge');
  if (el) el.textContent = formatCredits(c);
  if (badge) {
    badge.classList.toggle('low', c < CREDIT_CONFIG.REPORT_COST);
  }
  updateReportBtnState();
}

function updateReportBtnState() {
  const btn = document.getElementById('reportBtn');
  if (!btn) return;
  const hasSelection = !!(state.selectedNodeId && state.selectedTreeId);
  const hasCredits = getCredits() >= CREDIT_CONFIG.REPORT_COST;
  if (!hasSelection) {
    btn.classList.add('disabled');
  } else {
    btn.classList.remove('disabled');
  }
}

// ============================================================================
// REPORT GENERATOR
// ============================================================================
function collectPathNodes() {
  if (!state.selectedNodeId || !state.selectedTreeId) return [];
  const tree = state.trees.find(t => t.id === state.selectedTreeId);
  if (!tree) return [];
  const path = [];
  let nodeId = state.selectedNodeId;
  while (nodeId) {
    const node = tree.nodes.get(nodeId);
    if (!node) break;
    path.unshift({ word: node.word, depth: node.depth, identity: node.identity, visited: node.visited });
    nodeId = node.parentId;
  }
  return path;
}

function getIdentityLabel(identity) {
  const labels = {
    student: t('identity.student'), entrepreneur: t('identity.entrepreneur'),
    developer: t('identity.developer'), designer: t('identity.designer'),
    writer: t('identity.writer'), researcher: t('identity.researcher'),
  };
  return labels[identity] || identity;
}

function analyzePathPattern(pathNodes) {
  const words = pathNodes.map(n => n.word);
  const patterns = [];
  const categories = {
    abstract: ['思维','哲学','意识','意义','存在','真理','逻辑','直觉','反思','灵感','创意','情感','未来','宇宙','认知','心理'],
    concrete: ['设计','程序','代码','算法','数据','市场','产品','品牌','教育','健康','城市','美食','游戏','音乐','艺术'],
    process: ['分析','学习','创业','探索','创造','改进','沉淀','成长','部署','测试','演化'],
    emotion: ['快乐','悲伤','爱','愤怒','平静','灵感','表达'],
    tech: ['科技','AI','机器学习','神经网络','深度学习','自然语言','计算机视觉','自动化','数据'],
    business: ['创业','市场','品牌','营销','增长','产品','团队','资金','竞争'],
  };

  // Check if path moves from abstract to concrete
  const firstCat = Object.entries(categories).find(([, ws]) => ws.includes(words[0]));
  const lastCat = Object.entries(categories).find(([, ws]) => ws.includes(words[words.length - 1]));

  if (firstCat && lastCat && firstCat[0] !== lastCat[0]) {
    patterns.push({ type: 'transition', from: firstCat[0], to: lastCat[0] });
  }

  // Check for deepening (increasing specificity)
  if (pathNodes.length >= 3) {
    patterns.push({ type: 'deep_exploration', depth: pathNodes.length });
  }

  return { categories: { firstCat, lastCat }, patterns };
}

function generateSuggestions(pathNodes, bookmarks) {
  const suggestions = [];
  const rootWord = pathNodes[0]?.word;
  const currentWord = pathNodes[pathNodes.length - 1]?.word;
  const bookmarkWords = bookmarks.map(b => b.word);

  // Suggestion 1: Based on root word
  if (rootWord) {
    const assoc = getAssociations(rootWord);
    suggestions.push({
      text: `围绕起始词「${rootWord}」可以继续探索的方向：${assoc.slice(0, 3).join('、')}。建议以这些方向为起点开启新的探索树。`,
      priority: 'high',
    });
  }

  // Suggestion 2: Based on bookmarks
  if (bookmarkWords.length >= 2) {
    suggestions.push({
      text: `您收藏了 ${bookmarkWords.length} 个节点（${bookmarkWords.join('、')}），这些词之间存在潜在的交叉关联，建议尝试将它们进行共振连接（Shift+拖拽节点），可能会发现新的创意组合。`,
      priority: 'medium',
    });
  }

  // Suggestion 3: Based on path depth
  if (pathNodes.length >= 4) {
    suggestions.push({
      text: `当前探索已达到 ${pathNodes.length} 层深度，建议回溯到中间节点「${pathNodes[Math.floor(pathNodes.length / 2)]?.word}」重新分叉，可能会有全新的发现路径。`,
      priority: 'high',
    });
  } else {
    suggestions.push({
      text: `当前探索深度较浅，建议继续沿当前方向深入，或切换到不同身份视角重新审视「${rootWord || currentWord}」。`,
      priority: 'medium',
    });
  }

  // Suggestion 4: Based on the final word
  if (currentWord && rootWord !== currentWord) {
    const currAssoc = getAssociations(currentWord);
    suggestions.push({
      text: `从「${currentWord}」可以进一步发散到：${currAssoc.slice(0, 3).join('、')}。这些方向可能与您的原始问题「${rootWord}」产生有意义的交叉。`,
      priority: 'medium',
    });
  }

  // Suggestion 5: Cross-tree insight
  if (state.trees.length > 1) {
    const allRoots = state.trees.map(t => t.rootWord);
    suggestions.push({
      text: `您已创建 ${state.trees.length} 棵探索树（${allRoots.join('、')}），建议用共振连线连接不同树中的相关节点来发现跨领域洞察。`,
      priority: 'low',
    });
  }

  return suggestions;
}

function generateReport(pathNodes) {
  const bookmarks = state.bookmarks;
  const analysis = analyzePathPattern(pathNodes);
  const suggestions = generateSuggestions(pathNodes, bookmarks);
  const now = new Date();
  const timeStr = now.toLocaleString(currentLang === 'en' ? 'en-US' : 'zh-CN');

  const totalNodes = state.trees.reduce((sum, tree) => sum + tree.nodes.size, 0);
  const maxDepth = pathNodes.length > 0 ? pathNodes[pathNodes.length - 1].depth : 0;

  let html = '';

  // Header
  html += `<p style="color:var(--fg-tertiary);font-size:12px;margin-bottom:20px;">${timeStr} &nbsp;|&nbsp; ${getIdentityLabel(state.identity)} &nbsp;|&nbsp; ${state.model}</p>`;

  // Section 1: Path Review
  html += `<h2>${t('report.section1')}</h2>`;
  if (pathNodes.length > 0) {
    html += `<p>${t('report.pathLabel')}：`;
    pathNodes.forEach((n, i) => {
      html += `<span class="path-tag">${n.word}</span>`;
      if (i < pathNodes.length - 1) html += ' <span style="color:var(--synaptic-purple);">→</span> ';
    });
    html += `</p>`;
    html += `<p>${t('report.rootWord')}：<strong>${pathNodes[0]?.word}</strong>，${t('report.currentWord')}：<strong>${pathNodes[pathNodes.length - 1]?.word}</strong></p>`;
    html += `<p>从 <strong>${pathNodes[0]?.word}</strong> 出发，经过 ${pathNodes.length - 1} 步探索到达 <strong>${pathNodes[pathNodes.length - 1]?.word}</strong>。`;
    if (analysis.categories.firstCat && analysis.categories.lastCat && analysis.categories.firstCat[0] !== analysis.categories.lastCat[0]) {
      html += `这一路径体现了从<strong>${analysis.categories.firstCat[0]}</strong>领域向<strong>${analysis.categories.lastCat[0]}</strong>领域的跨域思考。`;
    }
    html += `</p>`;
  } else {
    html += `<p>当前没有活跃的探索路径。选择一个节点以生成完整报告。</p>`;
  }

  // Section 2: Logical Analysis
  html += `<h2>${t('report.section2')}</h2>`;

  if (analysis.patterns.some(p => p.type === 'transition')) {
    html += `<div class="insight-box purple"><p><strong>跨领域思维迁移</strong><br>您的探索从 ${analysis.categories.firstCat?.[0] || '初始'} 领域跨越到 ${analysis.categories.lastCat?.[0] || '新'} 领域，表现出跨界联想的思维特征。这种类型的思想跳跃常常是创新的源头。</p></div>`;
  }

  if (pathNodes.length >= 3) {
    html += `<div class="insight-box green"><p><strong>深度探索模式</strong><br>您已连续深入 ${pathNodes.length} 层节点，展现出对当前主题的持续兴趣和探索深度。深度探索有助于发现隐藏在表面关联之下的非显而易见的连接。</p></div>`;
  }

  // Word relationship analysis
  if (pathNodes.length >= 2) {
    html += `<p>路径节点间的语义关系：</p><ul>`;
    for (let i = 1; i < pathNodes.length; i++) {
      const prev = pathNodes[i - 1];
      const curr = pathNodes[i];
      const prevAssoc = getAssociations(prev.word);
      const isDirectAssoc = prevAssoc.includes(curr.word);
      html += `<li><strong>${prev.word}</strong> → <strong>${curr.word}</strong>：${isDirectAssoc ? '直接语义关联' : '探索性关联'}，属于${getIdentityLabel(curr.identity || state.identity)}视角下的自然延伸。</li>`;
    }
    html += `</ul>`;
  }

  if (bookmarks.length > 0) {
    const bmWords = bookmarks.map(b => b.word);
    html += `<div class="insight-box pink"><p><strong>关键标记节点</strong><br>您标记了 ${bmWords.length} 个重要节点：${bmWords.join('、')}。这些节点可能代表对当前主题最有价值的思考方向，建议在下一次探索中重点关注这些节点的子节点。</p></div>`;
  }

  // Section 3: Suggestions
  html += `<h2>${t('report.section3')}</h2>`;
  suggestions.forEach((s, i) => {
    const priorityColor = s.priority === 'high' ? 'green' : s.priority === 'medium' ? 'purple' : 'pink';
    html += `<div class="insight-box ${priorityColor}"><p><strong>${t('report.suggestion')} ${i + 1}</strong><br>${s.text}</p></div>`;
  });

  // Section 4: Bookmarked Nodes
  html += `<h2>${t('report.section4')}</h2>`;
  if (bookmarks.length > 0) {
    html += `<ul>`;
    bookmarks.forEach(b => {
      html += `<li><strong>${b.word}</strong>${b.note ? ' — ' + b.note : ''}</li>`;
    });
    html += `</ul>`;
  } else {
    html += `<p>暂无收藏节点。在探索过程中点击节点旁的星标即可收藏重要节点，它们将出现在此报告中。</p>`;
  }

  // Meta footer
  html += `<div class="meta-bar">`;
  html += `<span>${t('report.generatedAt')}：${timeStr}</span>`;
  html += `<span>${t('report.identity')}：${getIdentityLabel(state.identity)}</span>`;
  html += `<span>${t('report.depth')}：${maxDepth}</span>`;
  html += `<span>${t('report.nodeCount')}：${totalNodes}</span>`;
  html += `<span>${t('report.bookmarkCount')}：${bookmarks.length}</span>`;
  html += `<span>${t('report.treeCount')}：${state.trees.length}</span>`;
  html += `</div>`;

  return html;
}

// ============================================================================
// CREDIT & REPORT UI INTERACTIONS
// ============================================================================
const reportBtn = document.getElementById('reportBtn');
const creditOverlay = document.getElementById('creditOverlay');
const creditCancel = document.getElementById('creditCancel');
const creditConfirm = document.getElementById('creditConfirm');
const creditInsufficient = document.getElementById('creditInsufficient');
const creditActions = document.getElementById('creditActions');
const creditInsufficientRecharge = document.getElementById('creditInsufficientRecharge');
const reportPanelOverlay = document.getElementById('reportPanelOverlay');
const reportPanel = document.getElementById('reportPanel');
const reportPanelBody = document.getElementById('reportPanelBody');
const reportClose = document.getElementById('reportClose');
const reportCopy = document.getElementById('reportCopy');
const creditBadge = document.getElementById('creditBadge');
const creditDetailPanel = document.getElementById('creditDetailPanel');

let reportGenerating = false;

// ── Open credit confirm dialog ──
reportBtn.addEventListener('click', () => {
  if (reportBtn.classList.contains('disabled') || reportBtn.classList.contains('generating')) return;
  if (!state.selectedNodeId || !state.selectedTreeId) return;

  const credits = getCredits();
  const pathNodes = collectPathNodes();
  const pathStr = pathNodes.map(n => n.word).join(' → ') || t('credit.path');

  document.getElementById('creditConfirmBalance').textContent = formatCredits(credits);
  document.getElementById('creditConfirmAfter').textContent = formatCredits(Math.max(0, credits - CREDIT_CONFIG.REPORT_COST));
  document.getElementById('creditPathChain').textContent = pathStr;

  if (credits < CREDIT_CONFIG.REPORT_COST) {
    creditInsufficient.style.display = 'block';
    creditActions.style.display = 'none';
  } else {
    creditInsufficient.style.display = 'none';
    creditActions.style.display = 'flex';
  }

  creditOverlay.classList.add('open');
});

// ── Close credit overlay ──
creditCancel.addEventListener('click', () => {
  creditOverlay.classList.remove('open');
});
creditOverlay.addEventListener('click', (e) => {
  if (e.target === creditOverlay) creditOverlay.classList.remove('open');
});

// ── Confirm generation ──
creditConfirm.addEventListener('click', () => {
  if (reportGenerating) return;
  reportGenerating = true;

  const result = deductCredits(CREDIT_CONFIG.REPORT_COST, `Generate report from "${state.trees.find(t => t.id === state.selectedTreeId)?.rootWord || 'unknown'}"`);
  if (!result.success) {
    showToast(t('credit.insufficient'));
    reportGenerating = false;
    creditOverlay.classList.remove('open');
    return;
  }

  // Show generating state
  reportBtn.classList.add('generating');
  creditOverlay.classList.remove('open');
  updateCreditUI();
  updateCreditDetailPanel();

  // Generate report
  setTimeout(() => {
    const pathNodes = collectPathNodes();
    const reportHTML = generateReport(pathNodes);
    reportPanelBody.innerHTML = reportHTML;
    reportPanelOverlay.classList.add('open');
    reportPanel.classList.add('open');
    reportBtn.classList.remove('generating');
    reportGenerating = false;
  }, 600);
});

// ── Insufficient credits → show credit panel ──
creditInsufficientRecharge.addEventListener('click', () => {
  creditOverlay.classList.remove('open');
  openCreditDetailPanel();
});

// ── Close report panel ──
function closeReportPanel() {
  reportPanelOverlay.classList.remove('open');
  reportPanel.classList.remove('open');
}
reportClose.addEventListener('click', closeReportPanel);
reportPanelOverlay.addEventListener('click', (e) => {
  if (e.target === reportPanelOverlay) closeReportPanel();
});

// ── Copy report ──
reportCopy.addEventListener('click', () => {
  const text = reportPanelBody.innerText;
  navigator.clipboard.writeText(text).then(() => {
    showToast(t('report.copied'));
  }).catch(() => {
    showToast('Copy failed');
  });
});

// ── Credit badge → detail panel ──
creditBadge.addEventListener('click', (e) => {
  e.stopPropagation();
  if (creditDetailPanel.classList.contains('open')) {
    creditDetailPanel.classList.remove('open');
  } else {
    openCreditDetailPanel();
  }
});

function openCreditDetailPanel() {
  updateCreditDetailPanel();
  creditDetailPanel.classList.add('open');
  folderPanel.classList.remove('open');
}

function updateCreditDetailPanel() {
  const credits = getCredits();
  document.getElementById('creditDetailBalance').textContent = formatCredits(credits);
  const history = getCreditHistory();
  const container = document.getElementById('creditDetailHistory');
  if (history.length === 0) {
    container.innerHTML = `<div class="credit-detail-empty" data-i18n="credit.noHistory">${t('credit.noHistory')}</div>`;
  } else {
    container.innerHTML = history.slice(0, 10).map(h => {
      const d = new Date(h.time);
      const tStr = d.toLocaleString(currentLang === 'en' ? 'en-US' : 'zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      const cls = h.amount < 0 ? 'deduct' : '';
      return `<div class="h-item"><span class="h-desc">${tStr} — ${h.detail}</span><span class="h-amount ${cls}">${h.amount < 0 ? '' : '+'}${h.amount}</span></div>`;
    }).join('');
  }
}

// ── Recharge button (placeholder) ──
document.getElementById('creditRechargeBtn').addEventListener('click', () => {
  showToast(t('credit.comingSoon'));
});

// Close credit detail on outside click
document.addEventListener('click', (e) => {
  if (creditDetailPanel.classList.contains('open') &&
      !creditDetailPanel.contains(e.target) &&
      !creditBadge.contains(e.target)) {
    creditDetailPanel.classList.remove('open');
  }
});

// ── Keyboard: Escape to close panels ──
const origKeydown = document.onkeydown;
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (creditOverlay.classList.contains('open')) {
      creditOverlay.classList.remove('open');
      return;
    }
    if (reportPanel.classList.contains('open')) {
      closeReportPanel();
      return;
    }
    if (creditDetailPanel.classList.contains('open')) {
      creditDetailPanel.classList.remove('open');
      return;
    }
  }
});

// ── Init credit UI ──
updateCreditUI();
</script>

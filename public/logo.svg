<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --accent: #7C3AED;
      --accent-2: #DB2777;
      --accent-3: #3B82F6;
      --bg: #0D1117;
      --bg-secondary: #161B22;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --accent: #7C3AED;
        --accent-2: #DB2777;
        --accent-3: #3B82F6;
        --bg: #F5F3F8;
        --bg-secondary: #FFFFFF;
      }
    }
  </style>
  <!-- Radiating dendrite paths (5 directions) -->
  <g stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" opacity="0.55">
    <line x1="32" y1="32" x2="12" y2="11"/>
    <line x1="32" y1="32" x2="55" y2="10"/>
    <line x1="32" y1="32" x2="58" y2="40"/>
    <line x1="32" y1="32" x2="45" y2="57"/>
    <line x1="32" y1="32" x2="13" y2="50"/>
  </g>
  <!-- Terminal boutons (three-color system) -->
  <circle cx="12" cy="11" r="3.5" fill="var(--accent)" opacity="0.75"/>
  <circle cx="55" cy="10" r="4" fill="var(--accent-3)" opacity="0.75"/>
  <circle cx="58" cy="40" r="3.5" fill="var(--accent)" opacity="0.75"/>
  <circle cx="45" cy="57" r="3" fill="var(--accent-2)" opacity="0.65"/>
  <circle cx="13" cy="50" r="3" fill="var(--accent)" opacity="0.65"/>
  <!-- Central soma node -->
  <circle cx="32" cy="32" r="9" fill="var(--bg-secondary)" stroke="var(--accent)" stroke-width="2"/>
  <circle cx="32" cy="32" r="4" fill="var(--accent)"/>
</svg>
